---
deployment:
  tasks:
    # ── Runtime directories above public_html (not web-accessible) ─────────────
    - /bin/mkdir -p /home/playrealm/logs
    - /bin/mkdir -p /home/playrealm/database

    # ── Writable permissions ────────────────────────────────────────────────────
    - /bin/chmod -R 755 /home/playrealm/logs
    - /bin/chmod -R 755 /home/playrealm/database

    # Optional – import / update the MySQL schema (safe to re-run because
    # the SQL uses CREATE TABLE IF NOT EXISTS). Uncomment the line below
    # and replace DB_USER, DB_PASS, and DB_NAME with your cPanel MySQL
    # credentials to have the database updated automatically on every deploy.
    #
    # - /usr/bin/mysql -u DB_USER -p"DB_PASS" DB_NAME < /home/playrealm/database/schema.sql
