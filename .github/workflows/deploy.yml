name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Trigger cPanel Git deployment
        run: |
          HTTP_CODE=$(curl --silent --output /tmp/cpanel_response.json --write-out '%{http_code}' \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/update?repository_root=${{ secrets.CPANEL_REPO_PATH }}")

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::cPanel API returned HTTP $HTTP_CODE"
            cat /tmp/cpanel_response.json
            exit 1
          fi

          echo "cPanel deployment triggered successfully (HTTP $HTTP_CODE)"
